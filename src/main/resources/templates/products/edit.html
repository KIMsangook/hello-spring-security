<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>상품 수정 - HanSung</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .navbar { background: linear-gradient(90deg, #1a1a2e, #0f3460); }
        .navbar-brand { font-weight: 800; color: #e94560 !important; font-size: 1.4rem; }
        .page-header { border-left: 4px solid #e94560; padding-left: 1rem; }
        .card { border-radius: 14px; }
        .form-label { font-weight: 600; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark mb-4">
    <div class="container">
        <a class="navbar-brand" th:href="@{/home}">HanSung</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navMenu">
            <ul class="navbar-nav me-auto">
                <li class="nav-item"><a class="nav-link" th:href="@{/home}">홈</a></li>
                <li class="nav-item"><a class="nav-link active" th:href="@{/products}">상품 목록</a></li>
                <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                    <a class="nav-link" th:href="@{/products/add}">상품 등록</a>
                </li>
                <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                    <a class="nav-link" th:href="@{/admin/dashboard}">관리자</a>
                </li>
            </ul>
            <form th:action="@{/logout}" method="post" class="d-flex">
                <button class="btn btn-outline-light btn-sm px-3">로그아웃</button>
            </form>
        </div>
    </div>
</nav>

<div class="container" style="max-width: 760px;">
    <div class="page-header mb-4">
        <h4 class="fw-bold mb-1">상품 수정</h4>
        <small class="text-muted">상품 정보를 수정한 뒤 저장하세요.</small>
    </div>

    <div class="card border-0 shadow-sm">
        <div class="card-body p-4">
            <form th:action="@{/products/{id}/edit(id=${productId})}"
                  th:object="${productDto}"
                  method="post">

                <div class="mb-3">
                    <label for="name" class="form-label">상품명</label>
                    <input type="text"
                           id="name"
                           class="form-control"
                           th:field="*{name}"
                           th:classappend="${#fields.hasErrors('name')} ? 'is-invalid'">
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('name')}"
                         th:errors="*{name}"></div>
                </div>

                <div class="mb-3">
                    <label for="price" class="form-label">가격</label>
                    <input type="number"
                           id="price"
                           class="form-control"
                           th:field="*{price}"
                           th:classappend="${#fields.hasErrors('price')} ? 'is-invalid'">
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('price')}"
                         th:errors="*{price}"></div>
                </div>

                <div class="mb-3">
                    <label for="stock" class="form-label">재고</label>
                    <input type="number"
                           id="stock"
                           class="form-control"
                           th:field="*{stock}"
                           th:classappend="${#fields.hasErrors('stock')} ? 'is-invalid'">
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('stock')}"
                         th:errors="*{stock}"></div>
                </div>

                <div class="mb-4">
                    <label for="description" class="form-label">설명</label>
                    <textarea id="description"
                              rows="4"
                              class="form-control"
                              th:field="*{description}"
                              th:classappend="${#fields.hasErrors('description')} ? 'is-invalid'"></textarea>
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('description')}"
                         th:errors="*{description}"></div>
                </div>

                <div class="d-flex justify-content-end gap-2">
                    <a th:href="@{/products}" class="btn btn-outline-secondary px-4">취소</a>
                    <button type="submit" class="btn btn-danger px-4">저장</button>
                </div>
            </form>
        </div>
    </div>
    <p th:text="${'학번:2171048 | 성명: 김상욱 | 실습 수행: ' + #temporals.format(#temporals.createNow(), 'yyyy-MM-dd HH:mm:ss')}"></p>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
