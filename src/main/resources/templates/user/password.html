<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>비밀번호 변경 - HanSung</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .navbar { background: linear-gradient(90deg, #1a1a2e, #0f3460); }
        .navbar-brand { font-weight: 800; color: #e94560 !important; font-size: 1.4rem; }
        .page-header { border-left: 4px solid #e94560; padding-left: 1rem; }
        .password-wrapper { max-width: 560px; margin: 0 auto; }
        .hint-box {
            background-color: #fff5f7;
            border: 1px solid #ffd6de;
            color: #7a2230;
            border-radius: 0.75rem;
            padding: 0.9rem 1rem;
            font-size: 0.95rem;
        }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark mb-4">
    <div class="container">
        <a class="navbar-brand" th:href="@{/home}">HanSung</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navMenu">
            <ul class="navbar-nav me-auto">
                <li class="nav-item"><a class="nav-link" th:href="@{/home}">홈</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/products}">상품 목록</a></li>
                <li class="nav-item"><a class="nav-link active" th:href="@{/user/password}">비밀번호 변경</a></li>
            </ul>

            <form th:action="@{/logout}" method="post" class="d-flex">
                <button class="btn btn-outline-light btn-sm px-3">로그아웃</button>
            </form>
        </div>
    </div>
</nav>

<div class="container">
    <div class="password-wrapper">
        <div class="mb-4 page-header">
            <h4 class="fw-bold mb-1">비밀번호 변경</h4>
            <p class="text-muted mb-0">현재 비밀번호를 확인한 뒤 새 비밀번호로 변경합니다.</p>
        </div>

        <div class="alert alert-success" th:if="${successMessage}" th:text="${successMessage}"></div>

        <div class="card border-0 shadow-sm">
            <div class="card-body p-4 p-md-5">

                <div class="hint-box mb-4">
                    새 비밀번호는 8자 이상으로 입력하세요.
                </div>

                <form th:action="@{/user/password}" method="post" th:object="${passwordChangeDto}">
                    <div class="mb-3">
                        <label for="currentPassword" class="form-label fw-semibold">현재 비밀번호</label>
                        <input type="password"
                               id="currentPassword"
                               th:field="*{currentPassword}"
                               class="form-control"
                               placeholder="현재 비밀번호 입력"
                               th:classappend="${#fields.hasErrors('currentPassword')} ? ' is-invalid'">
                        <div class="invalid-feedback"
                             th:if="${#fields.hasErrors('currentPassword')}"
                             th:errors="*{currentPassword}">
                            현재 비밀번호 오류
                        </div>
                    </div>

                    <div class="mb-3">
                        <label for="newPassword" class="form-label fw-semibold">새 비밀번호</label>
                        <input type="password"
                               id="newPassword"
                               th:field="*{newPassword}"
                               class="form-control"
                               placeholder="새 비밀번호 입력"
                               th:classappend="${#fields.hasErrors('newPassword')} ? ' is-invalid'">
                        <div class="invalid-feedback"
                             th:if="${#fields.hasErrors('newPassword')}"
                             th:errors="*{newPassword}">
                            새 비밀번호 오류
                        </div>
                    </div>

                    <div class="mb-4">
                        <label for="confirmPassword" class="form-label fw-semibold">새 비밀번호 확인</label>
                        <input type="password"
                               id="confirmPassword"
                               th:field="*{confirmPassword}"
                               class="form-control"
                               placeholder="새 비밀번호 다시 입력"
                               th:classappend="${#fields.hasErrors('confirmPassword')} ? ' is-invalid'">
                        <div class="invalid-feedback"
                             th:if="${#fields.hasErrors('confirmPassword')}"
                             th:errors="*{confirmPassword}">
                            새 비밀번호 확인 오류
                        </div>
                    </div>

                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-danger px-4">변경하기</button>
                        <a th:href="@{/home}" class="btn btn-outline-secondary">취소</a>
                    </div>
                </form>

            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
